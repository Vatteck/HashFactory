name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/siliconsage.jks
          echo "KEYSTORE_PATH=siliconsage.jks" >> local.properties
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See CHANGELOG.md for details."
          fi

          echo "$CHANGELOG" > changelog_extract.txt

      - name: Find and rename APK
        id: apk
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RAW=$(find . -maxdepth 2 -name "app-release.apk" | head -n 1)
          if [ -z "$RAW" ] || [ ! -f "$RAW" ]; then
            echo "app-release.apk not found — contents:"
            find . -name "*.apk" | head -20
            exit 1
          fi
          NAMED="MINER_${VERSION}.apk"
          mv "$RAW" "$NAMED"
          echo "path=$NAMED" >> $GITHUB_OUTPUT
          echo "Renamed: $RAW → $NAMED"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Hash Factory v${{ steps.version.outputs.version }}"
          body_path: changelog_extract.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'dev') || contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
          files: |
            ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          APK="${{ steps.apk.outputs.path }}"
          REPO="${{ github.repository }}"
          DATE=$(date -u +%Y-%m-%d)
          BUILD=${{ github.run_number }}

          jq -n \
            --arg version "$VERSION" \
            --argjson build "$BUILD" \
            --arg date "$DATE" \
            --argjson changelog "$(git log --oneline -7 | jq -R . | jq -s .)" \
            --arg url "https://github.com/$REPO/releases/tag/$TAG" \
            --arg downloadUrl "https://github.com/$REPO/releases/download/$TAG/$APK" \
            '{version: $version, build: $build, date: $date, changelog: $changelog, url: $url, downloadUrl: $downloadUrl}' \
            > version.json

      - name: Commit version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: update version.json for ${{ steps.version.outputs.tag }}"
          git push origin HEAD:refs/heads/master
